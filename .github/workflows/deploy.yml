name: Deploy to VPS

on:
  push:
    branches: [master, main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate VPS secrets
        run: |
          missing=0
          [ -n "${{ secrets.VPS_HOST }}" ] || { echo "::error::VPS_HOST secret is not set on this repository"; missing=1; }
          [ -n "${{ secrets.VPS_USERNAME }}" ] || { echo "::error::VPS_USERNAME secret is not set on this repository"; missing=1; }
          [ -n "${{ secrets.VPS_PASSWORD }}" ] || { echo "::error::VPS_PASSWORD secret is not set on this repository"; missing=1; }
          [ -n "${{ secrets.VPS_PORT }}" ] || { echo "::error::VPS_PORT secret is not set on this repository"; missing=1; }
          exit "$missing"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 30m
          debug: true
          script: |
            set -e
            APP_DIR="$HOME/luxestate/web"
            REPO="https://github.com/somadina94/luxestate_client.git"
            BRANCH="${{ github.ref_name }}"

            mkdir -p "$(dirname "$APP_DIR")"

            if [ -d "$APP_DIR/.git" ] && git -C "$APP_DIR" remote get-url origin 2>/dev/null | grep -qi luxestate_client; then
              cd "$APP_DIR"
              git fetch origin
              git checkout "$BRANCH" 2>/dev/null || git checkout -b "$BRANCH" "origin/$BRANCH"
              git reset --hard "origin/$BRANCH"
            else
              ENV_BAK=$(mktemp)
              LOGS_BAK=$(mktemp -d)
              [ -f "$APP_DIR/.env" ] && cp "$APP_DIR/.env" "$ENV_BAK"
              [ -d "$APP_DIR/logs" ] && cp -a "$APP_DIR/logs/." "$LOGS_BAK/" 2>/dev/null || true
              rm -rf "$APP_DIR"
              git clone -b "$BRANCH" "$REPO" "$APP_DIR"
              cd "$APP_DIR"
              [ -s "$ENV_BAK" ] && cp "$ENV_BAK" .env
              [ "$(ls -A "$LOGS_BAK" 2>/dev/null)" ] && mkdir -p logs && cp -a "$LOGS_BAK/." logs/
            fi

            chmod +x ./deploy.sh
            DEPLOY_BRANCH="$BRANCH" ./deploy.sh
